services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobfinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobfinder}
      POSTGRES_USER: ${POSTGRES_USER:-jobfinder_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env file}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jobfinder_app} -d ${POSTGRES_DB:-jobfinder}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgvector_data:
